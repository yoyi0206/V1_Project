name: Scraping Harian Jambi

on:
  schedule:
    - cron: '0 22 * * *'      # 05:00 WIB
  workflow_dispatch:           # tombol "Run workflow" manual

permissions:
  contents: write              # izin commit/push

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install library
        run: pip install requests beautifulsoup4 lxml

      - name: Jalankan scraping
        run: python scrape.py

      - name: Simpan hasil ke repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.csv
          # commit hanya jika ada perubahan
          git diff --staged --quiet || git commit -m "Data harian otomatis"
          # sinkron dulu dengan perubahan lain (mis. units.json dari Colab) sebelum push
          git pull --rebase origin main
          git push origin main
